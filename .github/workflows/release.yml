name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (Static)
    runs-on: ubuntu-latest
    container:
      image: crystallang/crystal:latest-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: shards install --production

      - name: Build static binary
        run: |
          crystal build src/facet.cr -o facet --release --static --no-debug
          strip facet

      - name: Package binary
        run: |
          tar -czvf facet-linux-amd64.tar.gz facet LICENSE README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: facet-linux-amd64
          path: facet-linux-amd64.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install dependencies
        run: shards install --production

      - name: Build binary
        run: crystal build src/facet.cr -o facet --release --no-debug

      - name: Package binary
        run: |
          tar -czvf facet-macos-amd64.tar.gz facet LICENSE README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: facet-macos-amd64
          path: facet-macos-amd64.tar.gz

  build-macos-arm:
    name: Build macOS (ARM64)
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install dependencies
        run: shards install --production

      - name: Build binary
        run: crystal build src/facet.cr -o facet --release --no-debug

      - name: Package binary
        run: |
          tar -czvf facet-macos-arm64.tar.gz facet LICENSE README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: facet-macos-arm64
          path: facet-macos-arm64.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-macos-arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: facet-linux-amd64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: facet-macos-amd64

      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: facet-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            facet-linux-amd64.tar.gz
            facet-macos-amd64.tar.gz
            facet-macos-arm64.tar.gz
